[workspace]
name = "spatialbrain"
version = "0.1.0"
description = "CAJAL Neuromics 2026 — Project 15: Mapping the Spatial Cellular Architecture of the Brain"
authors = ["Marius Lange <marius131119@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "linux-64"]

# Prepend the env's lib so its (newer, backward-compatible) libstdc++ is loaded before
# the system one. Without this, manylinux wheels (torch) pull the older system
# libstdc++ first and later imports needing a newer CXXABI (sqlite3/icu via liana) fail.
# Linux-only (macOS uses DYLD). The Jupyter kernel gets the same fix via
# scripts/patch_kernel_env.py (it launches python directly, bypassing this activation).
[target.linux-64.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

[tasks]
lab = "jupyter lab"
test = "pytest"
rename = { cmd = "python scripts/rename_package.py", description = "Rename the placeholder package/project (run once on a fresh clone; see scripts/rename_package.py)" }
install-kernel = { cmd = "python -m ipykernel install --user --name=spatialbrain --display-name='Spatial Brain (Project 15)' && python scripts/patch_kernel_env.py", description = "Register the Jupyter kernel and patch its LD_LIBRARY_PATH so the env's libstdc++ loads first (avoids torch-vs-icu CXXABI clashes)." }
install-hooks = { cmd = "pre-commit install --install-hooks && nbstripout --install && git config diff.ipynb.textconv 'nbstripout -t'", description = "Install pre-commit hooks + the nbstripout notebook-output filter (run once per clone)" }

[dependencies]
python = "3.12.*"
# Pin numpy <2.1: CellPose v3 requires numpy<2.1 (and it stays numba-compatible).
numpy = ">=2.0,<2.1"

# Shapely from conda to avoid pygeos build issues
shapely = "*"

# Proseg transcript-based segmentation (Rust binary) — bioconda; lands `proseg` on PATH
rust-proseg = ">=3.1"

[pypi-dependencies]
# (scikit-learn comes transitively via scanpy/cellmapper; the old `<1.8` pin only
# existed to dodge a cuML/GPU incompatibility, and jax was only needed by scvi-tools
# — both removed now that this is a CPU-only, scvi-free project.)

# Core single-cell stack
scanpy = ">=1.10"
squidpy = "*"
# L2 reference mapping (CPU, no GPU): Harmony shared latent space + CellMapper
# kNN label transfer / transcriptome imputation. Replaces GPU-favoured DiagVI.
cellmapper = ">=0.2.6"
harmony-pytorch = "*"
# torch stays for CellPose + Sopa + spatialdata. Linux gets the CPU wheel (see
# target table below); macOS uses the default wheel here. Pinned <2.9 to keep
# torch/torchvision paired with the available CPU-index builds.
torch = ">=2.4,<2.9"
# torchvision is pulled transitively; it must match torch exactly (else a
# circular-import / "no attribute 'extension'" failure), so pin + CPU-wheel it too.
torchvision = ">=0.19,<0.24"

# Notebook workflow
jupyterlab = "*"
ipykernel = "*"
ipywidgets = "*"
# Pin pandas < 3.0 until anndata supports Arrow-backed strings
# https://github.com/scverse/anndata/issues/1434
pandas = ">=2.0, <3"
matplotlib = "*"
seaborn = "*"

# Utilities
pre-commit = "*"
nbstripout = "*"
pytest = "*"
session-info2 = "*"

# Local editable package for path helpers
spatialbrain = { path = ".", editable = true }
igraph = ">=1.0.0, <2"
celltypist = ">=1.7.1, <2"
spatialdata = ">=0.7.3, <0.8"
spatialdata-io = ">=0.7.0, <0.8"
spatialdata-plot = ">=0.4.0, <0.5"
cellpose = ">=3.1, <4"   # v3 (CPU-friendly); v4 'cpsam' transformer is GPU-favoured
liana = ">=1.8.0, <2"
decoupler = ">=2.1.6, <3"
sopa = { version = ">=2.2.9, <3", extras = ["baysor"] }   # baysor extra -> toml, loompy
dask = { version = "*", extras = ["array"] }              # sopa requires dask[array]

# Linux default env: CPU torch from PyTorch's CPU index (avoids the CUDA wheel that
# drags in libs breaking conda-numpy's libstdc++ at runtime on compute nodes). macOS
# uses the default wheel above. This is a CPU-only project — there is no GPU env.
[target.linux-64.pypi-dependencies]
torch = { version = ">=2.4,<2.9", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.19,<0.24", index = "https://download.pytorch.org/whl/cpu" }
