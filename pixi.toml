[workspace]
name = "spatialbrain"
version = "0.1.0"
description = "CAJAL Neuromics 2026 — Project 15: Mapping the Spatial Cellular Architecture of the Brain"
authors = ["Marius Lange <marius131119@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
lab = "jupyter lab"
test = "pytest"
rename = { cmd = "python scripts/rename_package.py", description = "Rename the placeholder package/project (run once on a fresh clone; see scripts/rename_package.py)" }
install-kernel = "python -m ipykernel install --user --name=spatialbrain --display-name='Spatial Brain (Project 15)'"
install-hooks = { cmd = "pre-commit install --install-hooks", description = "Install pre-commit hooks (run once per clone)" }

[dependencies]
python = "3.12.*"
# Pin numpy to avoid conda/pypi conflicts with numba
numpy = ">=2.0,<2.2"

# CellRank accelerated linear algebra (PETSc/SLEPc)
# Pre-built from conda-forge; PyPI wheels require building from source
petsc4py = "*"
slepc4py = "*"

# Shapely from conda to avoid pygeos build issues
shapely = "*"

# Proseg transcript-based segmentation (Rust binary) — bioconda; lands `proseg` on PATH
rust-proseg = ">=3.1"

[pypi-dependencies]
# Compatibility fix: cuML (rapids dependency) incompatible with sklearn 1.8
# https://github.com/rapidsai/cuml/issues/6426
scikit-learn = "<1.8"

# CPU JAX on all platforms by default (MPS handled automatically by torch on
# macOS). The `gpu` environment overrides this with the CUDA build on Linux.
jax = "<0.9.0"

# Core single-cell stack
scanpy = ">=1.10"
squidpy = "*"
# diagvi extra pulls torch-geometric (DiagVI label transfer, L2)
scvi-tools = { version = "*", extras = ["diagvi"] }
cellrank = "*"
# Pin below 2.9: scvi-tools/lightning don't support torch 2.12's _dynamo API
# (import scvi breaks). Linux gets the CPU wheel (see target table below); macOS
# uses the default wheel here.
torch = ">=2.4,<2.9"
# torchvision is pulled transitively; it must match torch exactly (else a
# circular-import / "no attribute 'extension'" failure), so pin + CPU-wheel it too.
torchvision = ">=0.19,<0.24"

# Notebook workflow
jupyterlab = "*"
ipykernel = "*"
ipywidgets = "*"
# Pin pandas < 3.0 until anndata supports Arrow-backed strings
# https://github.com/scverse/anndata/issues/1434
pandas = ">=2.0, <3"
matplotlib = "*"
seaborn = "*"

# Utilities
pre-commit = "*"
nbstripout = "*"
pytest = "*"
session-info2 = "*"

# Local editable package for path helpers
spatialbrain = { path = ".", editable = true }
igraph = ">=1.0.0, <2"
celltypist = ">=1.7.1, <2"
spatialdata = ">=0.7.3, <0.8"
spatialdata-io = ">=0.7.0, <0.8"
spatialdata-plot = ">=0.4.0, <0.5"
cellpose = ">=4.2.1.1, <5"
liana = ">=1.8.0, <2"
decoupler = ">=2.1.6, <3"
sopa = { version = ">=2.2.9, <3", extras = ["baysor"] }   # baysor extra -> toml, loompy
dask = { version = "*", extras = ["array"] }              # sopa requires dask[array]

# Linux default env: CPU torch from PyTorch's CPU index (avoids the CUDA wheel that
# drags in libs breaking conda-numpy's libstdc++ at runtime on compute nodes). macOS
# uses the default wheel above. When cluster GPU access lands, add a CUDA torch
# override under the `gpu` feature.
[target.linux-64.pypi-dependencies]
torch = { version = ">=2.4,<2.9", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.19,<0.24", index = "https://download.pytorch.org/whl/cpu" }

# GPU stack — only materialized in the `gpu` environment (Linux + CUDA 12).
# The default environment is CPU-only and is what CI installs; macOS local also
# uses the default. Activate `gpu` explicitly on a Linux/CUDA box (e.g. Euler):
#
#     pixi install -e gpu
#     pixi run -e gpu install-kernel
[feature.gpu.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]

[feature.gpu.target.linux-64.pypi-dependencies]
# `rapids-cu12` extra pulls cuml/cupy/cudf from pypi.nvidia.com; without it
# rapids-singlecell installs without the GPU libs and silently runs on CPU.
rapids-singlecell = { version = ">=0.15, <0.16", extras = ["rapids-cu12"] }
jax = { version = "<0.9.0", extras = ["cuda12"] }

[environments]
gpu = ["gpu"]
